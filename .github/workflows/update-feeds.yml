name: Update Atom Feeds

on:
  schedule:
    # Runs daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Also allows manual runs from the Actions tab

jobs:
  update-feeds:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit updated .atom files

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Generate all feeds
        id: generate
        run: python generate_all.py
        # Allow the step to fail so the commit step always runs.
        # Partial successes (some scrapers ok, some failed) still write their
        # .atom and .sha256 files -- we want those committed before re-raising.
        continue-on-error: true

      - name: Commit updated feeds (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds/
          # Only commit if something actually changed
          if git diff --staged --quiet; then
            echo "No feed changes -- nothing to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            git commit -m "chore: update feeds ${TIMESTAMP}"
            git push
          fi

      - name: Fail if any scraper had errors
        if: steps.generate.outcome == 'failure'
        run: |
          echo "::error::One or more scrapers failed -- see the 'Generate all feeds' step above for details."
          exit 1
