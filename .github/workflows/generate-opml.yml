name: Generate OPML

on:
  workflow_dispatch:
    # Run manually from Actions -> "Generate OPML" -> "Run workflow"

jobs:
  generate-opml:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate OPML
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python generate_opml.py

      - name: Commit OPML (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds/subscriptions.opml
          if git diff --staged --quiet; then
            echo "No changes to subscriptions.opml -- nothing to commit."
          else
            git commit -m "chore: regenerate subscriptions.opml"
            git push
          fi
